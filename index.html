<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>NAI Metadata Viewer</title>

<script src="https://cdn.jsdelivr.net/npm/exifr/dist/full.umd.js"></script>

<style>

body{
font-family:Arial;
padding:40px;
background:#f5f5f5;
}

.layout{
display:flex;
gap:40px;
align-items:flex-start;
margin-top:20px;
}

.imagebox{
width:350px;
}

#preview{
width:100%;
border-radius:10px;
}

.container{
background:white;
padding:20px;
border-radius:10px;
flex:1;
}

.row{
margin-bottom:10px;
}

.label{
font-weight:bold;
}

.promptbox{
background:#f2f2f2;
padding:10px;
border-radius:6px;
margin-top:5px;
white-space:pre-wrap;
}

</style>

</head>

<body>

<h1>NovelAI Metadata Viewer</h1>

<p>이미지를 업로드하세요</p>

<input type="file" id="imageInput">


<div class="layout">

<div class="imagebox">
<img id="preview">
</div>


<div class="container">

<h2>Image Settings</h2>

<div class="row">
<span class="label">Seed:</span>
<span id="seed">-</span>
</div>

<div class="row">
<span class="label">Steps:</span>
<span id="steps">-</span>
</div>

<div class="row">
<span class="label">Sampler:</span>
<span id="sampler">-</span>
</div>

<div class="row">
<span class="label">CFG Scale:</span>
<span id="cfg">-</span>
</div>

<div class="row">
<span class="label">Size:</span>
<span id="size">-</span>
</div>

<h2>Prompt</h2>
<div id="prompt" class="promptbox">-</div>

<h2>Negative Prompt</h2>
<div id="negative" class="promptbox">-</div>

</div>

</div>


<script>

document.getElementById("imageInput").addEventListener("change", async function(event){

const file = event.target.files[0];

if(!file) return;


// 이미지 미리보기

const reader = new FileReader();

reader.onload=function(e){
document.getElementById("preview").src=e.target.result;
};

reader.readAsDataURL(file);


// 메타데이터 읽기

try{

const data = await exifr.parse(file,true);

let naiData=null;

for(const key in data){

if(typeof data[key] === "string" && data[key].includes("steps")){
naiData=data[key];
}

}


if(naiData){

const lines=naiData.split("\n");

let prompt=lines[0]||"";
let negative="";
let settings="";

for(const line of lines){

if(line.toLowerCase().includes("negative")){
negative=line.replace("Negative prompt:","").trim();
}

if(line.toLowerCase().includes("steps")){
settings=line;
}

}


document.getElementById("prompt").textContent=prompt;
document.getElementById("negative").textContent=negative;


const seed=settings.match(/Seed: ([0-9]+)/i);
const steps=settings.match(/Steps: ([0-9]+)/i);
const sampler=settings.match(/Sampler: ([^,]+)/i);
const cfg=settings.match(/CFG scale: ([0-9.]+)/i);
const size=settings.match(/Size: ([0-9x]+)/i);


if(seed) document.getElementById("seed").textContent=seed[1];
if(steps) document.getElementById("steps").textContent=steps[1];
if(sampler) document.getElementById("sampler").textContent=sampler[1];
if(cfg) document.getElementById("cfg").textContent=cfg[1];
if(size) document.getElementById("size").textContent=size[1];

}

}catch(err){

console.log(err);

}

});

</script>

</body>
</html>
