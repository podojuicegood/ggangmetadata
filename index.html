<!DOCTYPE html>
<html>
<head>

<meta charset="UTF-8">
<title>NAI Metadata Viewer</title>

<script src="https://cdn.jsdelivr.net/npm/exifr/dist/full.umd.js"></script>

<style>

body{
font-family:Arial;
background:#f6f6f6;
padding:40px;
}

.container{
display:grid;
grid-template-columns: 420px 1fr;
gap:40px;
align-items:start;
}

.image-panel img{
width:100%;
border-radius:20px;
background:white;
box-shadow:0 6px 15px rgba(0,0,0,0.15);
}

.right-panel{
display:flex;
flex-direction:column;
gap:20px;
}

.top-row{
display:grid;
grid-template-columns:1fr 1fr;
gap:15px;
}

.card{
background:white;
border-radius:16px;
padding:15px;
box-shadow:0 4px 10px rgba(0,0,0,0.1);
}

.prompt-card{
background:white;
border-radius:16px;
padding:15px;
box-shadow:0 4px 10px rgba(0,0,0,0.1);
}

.prompt-header{
display:flex;
justify-content:space-between;
align-items:center;
margin-bottom:10px;
}

.prompt-text{
white-space:pre-wrap;
word-break:break-word;
}

button{
background:black;
color:white;
border:none;
border-radius:10px;
padding:6px 14px;
cursor:pointer;
}

table{
width:100%;
border-collapse:collapse;
}

td{
padding:4px;
border-bottom:1px solid #ddd;
}

</style>

</head>

<body>

<input type="file" id="imageInput">

<div class="container">

<div class="image-panel">
<img id="preview">
</div>

<div class="right-panel">

<div class="top-row">

<div class="card">

<h3>Image Settings</h3>

<table>
<tr><td>Seed</td><td id="seed"></td></tr>
<tr><td>Steps</td><td id="steps"></td></tr>
<tr><td>Sampler</td><td id="sampler"></td></tr>
<tr><td>CFG</td><td id="cfg"></td></tr>
<tr><td>Size</td><td id="size"></td></tr>
</table>

</div>


<div class="card">

<h3>Character Prompt</h3>
<div id="charPrompt"></div>

<h3 style="margin-top:10px">Character UC</h3>
<div id="charUC"></div>

</div>

</div>


<div class="prompt-card">

<div class="prompt-header">
<h3>Prompt</h3>
<button onclick="copyBase()">Copy</button>
</div>

<div class="prompt-text" id="prompt"></div>

</div>


<div class="prompt-card">

<div class="prompt-header">
<h3>Negative</h3>
<button onclick="copyNegative()">Copy</button>
</div>

<div class="prompt-text" id="negative"></div>

</div>

</div>

</div>


<script>

let basePrompt=""
let negativePrompt=""

document.getElementById("imageInput").addEventListener("change", async function(event){

const file=event.target.files[0]
if(!file) return


const reader=new FileReader()

reader.onload=function(e){
document.getElementById("preview").src=e.target.result
}

reader.readAsDataURL(file)


try{

const data=await exifr.parse(file,true)

let jsonText=null

for(const key in data){

if(typeof data[key]==="string" && data[key].includes('"prompt"')){
jsonText=data[key]
}

}

if(!jsonText) return

const nai=JSON.parse(jsonText)


basePrompt=nai.prompt||""
negativePrompt=nai.uc||""

document.getElementById("prompt").textContent=basePrompt
document.getElementById("negative").textContent=negativePrompt


document.getElementById("seed").textContent=nai.seed||"-"
document.getElementById("steps").textContent=nai.steps||"-"
document.getElementById("sampler").textContent=nai.sampler||"-"
document.getElementById("cfg").textContent=nai.scale||"-"
document.getElementById("size").textContent=nai.width+" x "+nai.height


let charPrompt=""
let charUC=""

try{

charPrompt=nai.v4_prompt.caption.char_captions[0].char_caption||""
charUC=nai.v4_negative_prompt.caption.char_captions[0].char_caption||""

}catch{}

document.getElementById("charPrompt").textContent=charPrompt
document.getElementById("charUC").textContent=charUC


}catch(err){

console.log(err)

}

})


function copyBase(){

navigator.clipboard.writeText(basePrompt)

}

function copyNegative(){

navigator.clipboard.writeText(negativePrompt)

}

</script>

</body>
</html>
