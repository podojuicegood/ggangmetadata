<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>GGANG Metadata Viewer</title>

  <script src="https://cdn.jsdelivr.net/npm/exifr/dist/full.umd.js"></script>

  <style>
    *{
      box-sizing:border-box;
    }

    :root{
      --bg-color:#f4f3f0;
      --card-color:#ffffff;
      --button-color:#e0b2be;
      --button-text-color:#ffffff;
      --border-color:#d3d7c1;
      --edit-color:#eae9e6;
      --text-color:#333333;
      --scroll-track:#E7EBD4;
      --scroll-thumb:#b1b89d;
      --image-drag-bg:#eae9e6;
      --image-drag-border:#d3d7c1;
      --placeholder-color:#9b8d91;
      --button-shadow-color:#c98daa;
      --button-shadow-rgba:rgba(201,141,170,0.25);
    }
@font-face {
    font-family: 'A2z';
    src: url('https://cdn.jsdelivr.net/gh/projectnoonnu/2601-6@1.0/에이투지체-5Medium.woff2') format('woff2');
    font-weight: 500;
    font-display: swap;
}
    @font-face {
      font-family: 'Cafe24Surround';
      src: url('https://cdn.jsdelivr.net/gh/projectnoonnu/noonfonts_2105_2@1.0/Cafe24Ssurround.woff') format('woff');
      font-weight: normal;
      font-display: swap;
    }

    @font-face {
      font-family: 'Pretendard';
      src: url('https://cdn.jsdelivr.net/gh/projectnoonnu/pretendard@1.0/Pretendard-Regular.woff2') format('woff2');
      font-weight: 400;
      font-display: swap;
    }

    @font-face {
      font-family: 'TMoneyDungunbaram';
      src: url('https://cdn.jsdelivr.net/gh/projectnoonnu/noonfonts_20-07@1.0/TmoneyRoundWindExtraBold.woff') format('woff');
      font-weight: 800;
      font-display: swap;
    }

    @font-face {
      font-family: 'OneStoreMobileGothicTitleFont';
      src: url('https://cdn.jsdelivr.net/gh/projectnoonnu/noonfonts_2105_2@1.0/ONE-Mobile-Title.woff') format('woff');
      font-weight: normal;
      font-display: swap;
    }

    * {
      cursor: url('https://cdn.cursors-4u.net/previews/tiny-star-5c7f5702-32.webp') 32 32, auto !important;
    }

    body{
      margin:0;
      padding:32px;
      background:var(--bg-color);
      font-family:'Pretendard', sans-serif;
      color:var(--text-color);
    }

    h3,h4{
      font-family:'A2z', sans-serif;
      color:var(--text-color);
    }

    .file-controls{
      display:flex;
      gap:10px;
      align-items:center;
      margin-bottom:16px;
      flex-wrap:wrap;
    }

    .theme-button{
      margin-left:auto;
    }

    button{
      background:var(--button-color);
      color:var(--button-text-color);
      border:none;
      border-radius:8px;
      padding:6px 12px;
      font-size:12px;
      cursor:pointer;
      transition:all 0.15s ease;
      min-width:62px;
      height:30px;
      line-height:1;
      flex-shrink:0;
      font-family:'Pretendard', sans-serif;
    }

    button:hover{
      box-shadow:0 2px 7px var(--button-shadow-rgba);
    }

    #copyPromptBtn,
    #copyNegativeBtn,
    #copyCharPromptBtn,
    #copyCharUCBtn,
    .edit-btn{
      padding:3px 7px;
      font-size:11px;
      min-width:46px;
      height:24px;
      border-radius:7px;
    }

    .container{
      display:grid;
      grid-template-columns:420px 1fr;
      gap:28px;
      align-items:start;
    }

    .image-panel{
      display:flex;
      flex-direction:column;
      gap:14px;
    }

    .image-box{
      background:var(--card-color);
      border-radius:20px;
      padding:5px;
      box-shadow:0 4px 12px color-mix(in srgb, var(--button-shadow-color) 40%, transparent);
      height:605px;
      display:flex;
      align-items:center;
      justify-content:center;
      position:relative;
      border:2px solid var(--border-color);
      transition:all 0.2s ease;
      overflow:hidden;
    }

    .image-box.dragover{
      background:var(--image-drag-bg);
      border-color:var(--image-drag-border);
    }

    #preview{
      max-width:100%;
      max-height:100%;
      object-fit:contain;
      border-radius:14px;
      display:none;
      position:relative;
      z-index:2;
    }

    .image-placeholder{
      position:absolute;
      inset:0;
      display:flex;
      align-items:center;
      justify-content:center;
      text-align:center;
      color:var(--placeholder-color);
      padding:20px;
      z-index:1;
      pointer-events:none;
    }

    .right-panel{
      display:flex;
      flex-direction:column;
      gap:16px;
      min-width:0;
    }

    .prompt-card,
    .card{
      background:var(--card-color);
      border-radius:16px;
      padding:12px;
      box-shadow:0 4px 10px color-mix(in srgb, var(--button-shadow-color) 40%, transparent);
      min-width:0;
      height:190px;
      display:flex;
      flex-direction:column;
      overflow:hidden;
      border:2px solid var(--border-color);
      color:var(--text-color);
    }

    .prompt-header{
      display:flex;
      align-items:center;
      gap:8px;
      margin-bottom:8px;
    }

    .prompt-header h3,
    .card h3{
      margin:0;
      font-size:16px;
      line-height:1.2;
      flex-shrink:0;
    }

    .header-buttons{
      margin-left:auto;
      display:flex;
      gap:6px;
      align-items:center;
      flex-shrink:0;
    }

    .prompt-text{
      white-space:pre-wrap;
      word-break:break-word;
      overflow-wrap:anywhere;
      line-height:1.45;
      flex:1;
      min-height:0;
      overflow-y:auto;
      min-width:0;
      padding:4px;
      border-radius:8px;
      transition:background-color 0.15s ease;
      color:var(--text-color);
    }

    .top-row{
      display:grid;
      grid-template-columns:240px 1fr;
      gap:16px;
      align-items:start;
    }

    table{
      width:100%;
      border-collapse:collapse;
      font-size:13px;
      display:block;
      overflow-y:auto;
      flex:1;
      min-height:0;
      color:var(--text-color);
       padding-top:3px;
    }

    td{
      padding:6px 5px;
      border-bottom:1px solid #eee;
      vertical-align:top;
     
    }

    td:first-child{
      width:80px;
      color:var(--text-color);
      opacity:0.8;
    }
    .image-settings tr:last-child td{border-bottom: none;}
    .char-grid{
      display:grid;
      grid-template-columns:1fr 1fr;
      gap:14px;
      min-width:0;
      min-height:0;
      overflow:hidden;
      flex:1;
    }

    .char-col{
      min-width:0;
      min-height:0;
      overflow:hidden;
      display:flex;
      flex-direction:column;
    }

    .char-head{
      display:flex;
      align-items:center;
      gap:7px;
      margin-bottom:6px;
      flex-shrink:0;
    }

    .char-head h4{
      margin:0;
      font-size:13px;
      line-height:1.2;
    }

    .char-text{
      white-space:pre-wrap;
      word-break:break-word;
      overflow-wrap:anywhere;
      line-height:1.4;
      height:100px;
      overflow-y:auto;
      overflow-x:hidden;
      min-width:0;
      min-height:0;
      flex:1;
      padding:4px;
      border-radius:8px;
      transition:background-color 0.15s ease;
      color:var(--text-color);
    }

    [contenteditable="true"]{
      outline:none;
      background:var(--edit-color);
      border-radius:8px;
    }

    .gallery-section{
      margin-top:40px;
    }

    .gallery-title{
      margin:0 0 14px 0;
      font-size:20px;
    }

    .gallery-grid{
      display:grid;
      grid-template-columns:repeat(auto-fill, minmax(150px, 1fr));
      gap:10px;
    }

    .gallery-item{
      position:relative;
      background:var(--card-color);
      border-radius:14px;
      overflow:hidden;
      box-shadow:0 2px 8px rgba(0,0,0,0.08);
      transition:transform 0.15s ease;
      border:2px solid var(--border-color);
    }

    .gallery-item:hover{
      transform:scale(1.03);
    }

    .gallery-thumb{
      width:100%;
      aspect-ratio:1 / 1;
      object-fit:cover;
      display:block;
      cursor:pointer;
    }

    .gallery-info{
      padding:8px;
      font-size:11px;
      color:var(--text-color);
      background:var(--card-color);
      white-space:nowrap;
      overflow:hidden;
      text-overflow:ellipsis;
    }

    .gallery-delete{
      position:absolute;
      top:8px;
      right:8px;
      min-width:auto;
      width:15px;
      height:15px;
      border-radius:999px;
      padding:0;
      font-size:12px;
      line-height:1;
      background:var(--button-color);
      color:#fff;
      font-family:'Pretendard', sans-serif;
    }

    .gallery-delete:hover{
      background:var(--button-color);
      transform:none;
    }

    .modal{
      position:fixed;
      inset:0;
      background:rgba(0,0,0,0.35);
      display:flex;
      align-items:center;
      justify-content:center;
      z-index:1000;
      padding:20px;
    }

    .modal-box{
      width:340px;
      max-height:min(80vh, 700px);
      background:var(--card-color);
      border-radius:10px;
      padding:20px;
      box-shadow:0 10px 30px rgba(0,0,0,0.18);
      border:2px solid var(--border-color);
      color:var(--text-color);
    }

    .modal-box h3{
      margin:0 0 12px 0;
      font-size:16px;
      color:var(--text-color);
    }

    .modal-box input[type="text"]{
      width:100%;
      padding:10px 12px;
  
      border-radius:13px;
      font-size:14px;
      margin-bottom:14px;
      outline:none;
      font-family:'Pretendard', sans-serif;
      color:var(--text-color);
      background:#fff;
      border-radius:12px;
    }

    .modal-box input[type="color"]{
      width:100%;
      height:40px;
      border:none;
      background:transparent;
      padding:0;
      margin-bottom:12px;
    }

    .theme-label{
      display:block;
      margin-bottom:6px;
      font-size:13px;
      color:var(--text-color);
    }

    .modal-actions{
      display:flex;
      justify-content:flex-end;
      gap:8px;
      margin-top:2px;
    }

    #themeModal .modal-box{
      overflow-y:auto;
      display:block;
       border-radius:14px;
    }

    .theme-list{
      margin-top:16px;
      display:flex;
      flex-direction:column;
      gap:8px;
    }

    .theme-item{
      display:flex;
      align-items:center;
      gap:8px;
      background:var( --edit-color);
      padding:8px;
      border-radius:10px;
    }

    .theme-name{
      flex:1;
      font-size:13px;
      overflow:hidden;
      text-overflow:ellipsis;
      white-space:nowrap;
      color:var(--text-color);
    }

    .theme-small-btn{
      min-width:auto;
      width:56px;
      height:26px;
      font-size:11px;
      padding:0 6px;
    }
.theme-modal-header{
  display:flex;
  align-items:center;
  justify-content:space-between;
  gap:10px;
  margin-bottom:12px;
}

.theme-modal-header h3{
  margin:0;
}

.theme-close-btn{
  min-width:auto;
  width:26px;
  height:26px;
  padding:0;
  border-radius:999px;
  font-size:12px;
  line-height:1;
}
    ::-webkit-scrollbar{
      width:6px;
      height:6px;
    }

    ::-webkit-scrollbar-track{
      background:var(--scroll-track);
      border-radius:10px;
    }

    ::-webkit-scrollbar-thumb{
      background:var(--scroll-thumb);
      border-radius:10px;
    }

    ::-webkit-scrollbar-thumb:hover{
      background:var(--scroll-thumb);
    }

    @media (max-width: 980px){
      .container{
        grid-template-columns:1fr;
      }

      .top-row{
        grid-template-columns:1fr;
      }

      .image-box{
        min-height:360px;
        height:360px;
      }

      .theme-button{
        margin-left:0;
      }
     .image-settings{
  overflow:visible !important;
}

.image-settings table{
  display:table !important;
  width:100%;
  overflow:visible !important;
  flex:none !important;
  min-height:auto !important;
}

.image-settings::-webkit-scrollbar,
.image-settings table::-webkit-scrollbar{
  display:none;
}
    }
  </style>
</head>
<body>

  <div class="file-controls">
    <button type="button" onclick="document.getElementById('imageInput').click()">파일 선택</button>
    <button type="button" id="saveBtn" onclick="openSaveModal()" style="display:none;">저장</button>
    <button type="button" id="addGalleryBtn" onclick="addCurrentToGallery()" style="display:none;">갤러리 추가</button>
    <input type="file" id="imageInput" style="display:none;" accept="image/png,image/jpeg,image/webp">
    <button type="button" class="theme-button" onclick="openThemeModal()">테마</button>
  </div>

  <div class="container">
    <div class="image-panel">
      <div class="image-box" id="dropZone">
        <img id="preview" alt="">
        <div class="image-placeholder" id="imagePlaceholder">
          이미지를 여기로 드래그해서 업로드
        </div>
      </div>
    </div>

    <div class="right-panel">
      <div class="prompt-card">
        <div class="prompt-header">
          <h3>Prompt</h3>
          <div class="header-buttons">
            <button type="button" class="edit-btn" onclick="toggleEdit('prompt', this)">Edit</button>
            <button type="button" id="copyPromptBtn" onclick="copyBase()">Copy</button>
          </div>
        </div>
        <div class="prompt-text" id="prompt" contenteditable="false"></div>
      </div>

      <div class="prompt-card">
        <div class="prompt-header">
          <h3>Negative</h3>
          <div class="header-buttons">
            <button type="button" class="edit-btn" onclick="toggleEdit('negative', this)">Edit</button>
            <button type="button" id="copyNegativeBtn" onclick="copyNegative()">Copy</button>
          </div>
        </div>
        <div class="prompt-text" id="negative" contenteditable="false"></div>
      </div>

      <div class="top-row">
       <div class="card image-settings">
  <h3>Image Settings</h3>
  <table>
    <tr><td>Seed</td><td id="seed"></td></tr>
    <tr><td>Steps</td><td id="steps"></td></tr>
    <tr><td>Sampler</td><td id="sampler"></td></tr>
    <tr><td>CFG</td><td id="cfg"></td></tr>
    <tr><td>Size</td><td id="size"></td></tr>
    <tr><td>Prompt Guidance Rescale</td><td id="rescale"></td></tr>
  </table>
</div>

        <div class="card">
          <h3 style="margin-bottom:10px;">Character</h3>

          <div class="char-grid">
            <div class="char-col">
              <div class="char-head">
                <h4>Prompt</h4>
                <div class="header-buttons">
                  <button type="button" class="edit-btn" onclick="toggleEdit('charPrompt', this)">Edit</button>
                  <button type="button" id="copyCharPromptBtn" onclick="copyCharPrompt()">Copy</button>
                </div>
              </div>
              <div class="char-text" id="charPrompt" contenteditable="false"></div>
            </div>

            <div class="char-col">
              <div class="char-head">
                <h4>UC</h4>
                <div class="header-buttons">
                  <button type="button" class="edit-btn" onclick="toggleEdit('charUC', this)">Edit</button>
                  <button type="button" id="copyCharUCBtn" onclick="copyCharUC()">Copy</button>
                </div>
              </div>
              <div class="char-text" id="charUC" contenteditable="false"></div>
            </div>
          </div>
        </div>
      </div>
    </div>
  </div>

  <div class="gallery-section">
    <h3 class="gallery-title">Gallery</h3>
    <div id="gallery" class="gallery-grid"></div>
  </div>

  <div id="saveModal" class="modal" style="display:none;">
    <div class="modal-box">
      <h3>파일 이름 설정</h3>
      <input type="text" id="saveFileName" placeholder="새 파일 이름 입력">
      <div class="modal-actions">
        <button type="button" onclick="closeSaveModal()">취소</button>
        <button type="button" onclick="saveImageAs()">저장</button>
      </div>
    </div>
  </div>

  <div id="galleryModal" class="modal" style="display:none;">
    <div class="modal-box">
      <h3>갤러리 이름 설정</h3>
      <input type="text" id="galleryItemName" placeholder="갤러리에 표시할 이름 입력">
      <div class="modal-actions">
        <button type="button" onclick="closeGalleryModal()">취소</button>
        <button type="button" onclick="confirmAddToGallery()">저장</button>
      </div>
    </div>
  </div>

  <div id="themeModal" class="modal" style="display:none;">
 <div class="modal-box">
  <div class="theme-modal-header">
    <h3>테마 설정</h3>
    <button type="button" class="theme-close-btn" onclick="closeThemeModal()">✕</button>
  </div>

      <label class="theme-label">배경색</label>
      <input type="color" id="themeBg">

      <label class="theme-label">카드색</label>
      <input type="color" id="themeCard">

      <label class="theme-label">글자색</label>
      <input type="color" id="themeText">

      <label class="theme-label">버튼색</label>
      <input type="color" id="themeButton">

      <label class="theme-label">버튼 글자색</label>
      <input type="color" id="themeButtonText">

      <label class="theme-label">테두리색</label>
      <input type="color" id="themeBorder">

      <label class="theme-label">Edit 배경색</label>
      <input type="color" id="themeEdit">

      <label class="theme-label">버튼&카드 그림자색</label>
      <input type="color" id="themeButtonShadow">

      <input type="text" id="themeName" placeholder="테마 이름 입력">

      <div class="modal-actions">
    <button type="button" onclick="resetThemeToDefault()">초기화</button>
    <button type="button" onclick="saveTheme()">저장</button>
  </div>

      <div class="theme-list" id="themeList"></div>
    </div>
  </div>

  <script>
    const GALLERY_DB_NAME = "nai_metadata_gallery_db";
    const GALLERY_STORE_NAME = "galleryItems";
    const THEMES_STORAGE_KEY = "ggang_saved_themes_v2";
    const ACTIVE_THEME_STORAGE_KEY = "ggang_active_theme_v2";

    const DEFAULT_THEME = {
      name: "Default",
      bgColor: "#f4f3f0",
      cardColor: "#ffffff",
      textColor: "#333333",
      buttonColor: "#e0b2be",
      buttonTextColor: "#ffffff",
      borderColor: "#d3d7c1",
      editColor: "#eae9e6",
      buttonShadowColor: "#c98daa"
    };

    let currentFile = null;
    let basePrompt = "";
    let negativePrompt = "";
    let currentCharPrompt = "";
    let currentCharUC = "";
    let galleryData = [];
    let pendingGalleryFile = null;
    let savedThemes = JSON.parse(localStorage.getItem(THEMES_STORAGE_KEY) || "[]");

    document.getElementById("imageInput").addEventListener("change", function(event){
      const file = event.target.files[0];
      if(!file) return;
      handleImageFile(file);
    });

    async function handleImageFile(file){
      currentFile = file;
      document.getElementById("saveBtn").style.display = "inline-block";
      document.getElementById("addGalleryBtn").style.display = "inline-block";

      const reader = new FileReader();
      reader.onload = function(e){
        document.getElementById("preview").src = e.target.result;
        document.getElementById("preview").style.display = "block";
        document.getElementById("imagePlaceholder").style.display = "none";
      };
      reader.readAsDataURL(file);

      try{
        const data = await exifr.parse(file, true);

        let jsonText = null;

        for(const key in data){
          if(typeof data[key] === "string" && data[key].includes('"prompt"')){
            jsonText = data[key];
          }
        }

        if(!jsonText){
          clearMetadataDisplay();
          return;
        }

        const nai = JSON.parse(jsonText);
        applyMetadataToUI(nai);

      }catch(err){
        console.log(err);
      }
    }

    function applyMetadataToUI(nai){
      basePrompt = nai.prompt || "";
      negativePrompt = nai.uc || "";
      currentCharPrompt = "";
      currentCharUC = "";

      document.getElementById("prompt").textContent = basePrompt;
      document.getElementById("negative").textContent = negativePrompt;

      document.getElementById("seed").textContent = nai.seed || "-";
document.getElementById("steps").textContent = nai.steps || "-";
document.getElementById("sampler").textContent = nai.sampler || "-";
document.getElementById("cfg").textContent = nai.scale || "-";
document.getElementById("size").textContent =
  (nai.width && nai.height) ? `${nai.width} x ${nai.height}` : "-";

document.getElementById("rescale").textContent = nai.cfg_rescale ?? "-";
      try{
        currentCharPrompt = nai.v4_prompt.caption.char_captions[0].char_caption || "";
        currentCharUC = nai.v4_negative_prompt.caption.char_captions[0].char_caption || "";
      }catch(e){}

      document.getElementById("charPrompt").textContent = currentCharPrompt;
      document.getElementById("charUC").textContent = currentCharUC;

      resetEditStates();
    }

    function resetEditStates(){
      const editableIds = ["prompt", "negative", "charPrompt", "charUC"];
      editableIds.forEach(id => {
        const el = document.getElementById(id);
        if(el){
          el.contentEditable = "false";
        }
      });

      document.querySelectorAll(".edit-btn").forEach(btn => {
        btn.textContent = "Edit";
      });
    }

    function toggleEdit(id, btn){
      const el = document.getElementById(id);
      if(!el) return;

      if(el.contentEditable === "true"){
        el.contentEditable = "false";
        btn.textContent = "Edit";
      }else{
        el.contentEditable = "true";
        btn.textContent = "Save";
        el.focus();

        const range = document.createRange();
        range.selectNodeContents(el);
        range.collapse(false);
        const sel = window.getSelection();
        sel.removeAllRanges();
        sel.addRange(range);
      }
    }

    function clearMetadataDisplay(){
      basePrompt = "";
      negativePrompt = "";
      currentCharPrompt = "";
      currentCharUC = "";

      document.getElementById("prompt").textContent = "";
      document.getElementById("negative").textContent = "";
      document.getElementById("seed").textContent = "-";
      document.getElementById("steps").textContent = "-";
      document.getElementById("sampler").textContent = "-";
      document.getElementById("cfg").textContent = "-";
      document.getElementById("size").textContent = "-";
      document.getElementById("charPrompt").textContent = "";
      document.getElementById("charUC").textContent = "";
document.getElementById("rescale").textContent = "-";
      resetEditStates();
    }

    function flashButton(buttonId, defaultText){
      const btn = document.getElementById(buttonId);
      btn.textContent = "✓";
      setTimeout(()=>{
        btn.textContent = defaultText;
      }, 1200);
    }

    function copyBase(){
      const text = document.getElementById("prompt").innerText;
      navigator.clipboard.writeText(text);
      flashButton("copyPromptBtn", "Copy");
    }

    function copyNegative(){
      const text = document.getElementById("negative").innerText;
      navigator.clipboard.writeText(text);
      flashButton("copyNegativeBtn", "Copy");
    }

    function copyCharPrompt(){
      const text = document.getElementById("charPrompt").innerText;
      navigator.clipboard.writeText(text);
      flashButton("copyCharPromptBtn", "Copy");
    }

    function copyCharUC(){
      const text = document.getElementById("charUC").innerText;
      navigator.clipboard.writeText(text);
      flashButton("copyCharUCBtn", "Copy");
    }

    function openSaveModal(){
      if(!currentFile) return;

      const baseName = currentFile.name.replace(/\.[^/.]+$/, "");
      document.getElementById("saveFileName").value = baseName;
      document.getElementById("saveModal").style.display = "flex";
    }

    function closeSaveModal(){
      document.getElementById("saveModal").style.display = "none";
    }

    function saveImageAs(){
      if(!currentFile) return;

      let newName = document.getElementById("saveFileName").value.trim();
      if(!newName){
        newName = "image";
      }

      const ext = currentFile.name.split(".").pop() || "png";
      const finalName = `${newName}.${ext}`;

      const url = URL.createObjectURL(currentFile);
      const a = document.createElement("a");
      a.href = url;
      a.download = finalName;
      document.body.appendChild(a);
      a.click();
      document.body.removeChild(a);
      URL.revokeObjectURL(url);

      closeSaveModal();
    }

    function addCurrentToGallery(){
      if(!currentFile) return;

      pendingGalleryFile = currentFile;
      const baseName = currentFile.name.replace(/\.[^/.]+$/, "");
      document.getElementById("galleryItemName").value = baseName;
      document.getElementById("galleryModal").style.display = "flex";
    }

    function closeGalleryModal(){
      document.getElementById("galleryModal").style.display = "none";
      pendingGalleryFile = null;
    }

    async function confirmAddToGallery(){
      if(!pendingGalleryFile) return;

      let customName = document.getElementById("galleryItemName").value.trim();
      if(!customName){
        customName = pendingGalleryFile.name.replace(/\.[^/.]+$/, "");
      }

      await addToGallery(pendingGalleryFile, customName);
      document.getElementById("galleryModal").style.display = "none";
      pendingGalleryFile = null;
    }

    async function addToGallery(file, customName){
      const imageDataUrl = await readFileAsDataURL(file);
      const metadataJson = await extractMetadataJsonFromFile(file);

      if(!metadataJson) return;

      const item = {
        id: crypto.randomUUID ? crypto.randomUUID() : String(Date.now() + Math.random()),
        name: customName || file.name,
        originalFileName: file.name,
        imageDataUrl,
        metadataJson
      };

      galleryData.push(item);
      await saveGalleryToDB();
      renderGallery();
    }

    function readFileAsDataURL(file){
      return new Promise((resolve, reject)=>{
        const reader = new FileReader();
        reader.onload = e => resolve(e.target.result);
        reader.onerror = reject;
        reader.readAsDataURL(file);
      });
    }

    async function extractMetadataJsonFromFile(file){
      try{
        const data = await exifr.parse(file, true);

        for(const key in data){
          if(typeof data[key] === "string" && data[key].includes('"prompt"')){
            return data[key];
          }
        }
      }catch(err){
        console.log(err);
      }
      return null;
    }

    function renderGallery(){
      const gallery = document.getElementById("gallery");
      gallery.innerHTML = "";

      galleryData.forEach((item)=>{
        const wrapper = document.createElement("div");
        wrapper.className = "gallery-item";

        const img = document.createElement("img");
        img.className = "gallery-thumb";
        img.src = item.imageDataUrl;
        img.alt = item.name || "gallery image";
        img.onclick = () => loadGalleryItem(item.id);

        const info = document.createElement("div");
        info.className = "gallery-info";
        info.textContent = item.name || "image";

        const deleteBtn = document.createElement("button");
        deleteBtn.className = "gallery-delete";
        deleteBtn.type = "button";
        deleteBtn.textContent = "×";
        deleteBtn.onclick = async (e) => {
          e.stopPropagation();
          await deleteGalleryItem(item.id);
        };

        wrapper.appendChild(img);
        wrapper.appendChild(deleteBtn);
        wrapper.appendChild(info);
        gallery.appendChild(wrapper);
      });
    }

    async function loadGalleryItem(id){
      const item = galleryData.find(g => g.id === id);
      if(!item) return;

      document.getElementById("preview").src = item.imageDataUrl;
      document.getElementById("preview").style.display = "block";
      document.getElementById("imagePlaceholder").style.display = "none";

      document.getElementById("saveBtn").style.display = "inline-block";
      document.getElementById("addGalleryBtn").style.display = "none";

      try{
        const nai = JSON.parse(item.metadataJson);
        applyMetadataToUI(nai);
      }catch(err){
        console.log(err);
      }

      try{
        currentFile = dataURLToFile(
          item.imageDataUrl,
          item.originalFileName || item.name || "image.png"
        );
      }catch(err){
        console.log(err);
      }
    }

    function dataURLToFile(dataUrl, filename){
      const arr = dataUrl.split(",");
      const mimeMatch = arr[0].match(/:(.*?);/);
      const mime = mimeMatch ? mimeMatch[1] : "image/png";
      const bstr = atob(arr[1]);
      let n = bstr.length;
      const u8arr = new Uint8Array(n);

      while(n--){
        u8arr[n] = bstr.charCodeAt(n);
      }

      return new File([u8arr], filename, { type: mime });
    }

    async function deleteGalleryItem(id){
      galleryData = galleryData.filter(item => item.id !== id);
      await saveGalleryToDB();
      renderGallery();
    }

    function openGalleryDB(){
      return new Promise((resolve, reject)=>{
        const request = indexedDB.open(GALLERY_DB_NAME, 1);

        request.onupgradeneeded = function(event){
          const db = event.target.result;
          if(!db.objectStoreNames.contains(GALLERY_STORE_NAME)){
            db.createObjectStore(GALLERY_STORE_NAME, { keyPath: "id" });
          }
        };

        request.onsuccess = function(){
          resolve(request.result);
        };

        request.onerror = function(){
          reject(request.error);
        };
      });
    }

    async function saveGalleryToDB(){
      const db = await openGalleryDB();

      return new Promise((resolve, reject)=>{
        const tx = db.transaction(GALLERY_STORE_NAME, "readwrite");
        const store = tx.objectStore(GALLERY_STORE_NAME);

        store.clear();
        galleryData.forEach(item => {
          store.put(item);
        });

        tx.oncomplete = function(){
          resolve();
        };

        tx.onerror = function(){
          reject(tx.error);
        };
      });
    }

    async function loadGalleryFromDB(){
      const db = await openGalleryDB();

      return new Promise((resolve, reject)=>{
        const tx = db.transaction(GALLERY_STORE_NAME, "readonly");
        const store = tx.objectStore(GALLERY_STORE_NAME);
        const request = store.getAll();

        request.onsuccess = function(){
          galleryData = Array.isArray(request.result) ? request.result : [];
          renderGallery();
          resolve();
        };

        request.onerror = function(){
          reject(request.error);
        };
      });
    }

    function openThemeModal(){
      fillThemeInputsFromCurrent();
      renderThemeList();
      document.getElementById("themeModal").style.display = "flex";
    }

    function closeThemeModal(){
      document.getElementById("themeModal").style.display = "none";
    }

    function fillThemeInputsFromCurrent(){
      const style = getComputedStyle(document.documentElement);
      document.getElementById("themeBg").value = rgbToHex(style.getPropertyValue("--bg-color").trim());
      document.getElementById("themeCard").value = rgbToHex(style.getPropertyValue("--card-color").trim());
      document.getElementById("themeText").value = rgbToHex(style.getPropertyValue("--text-color").trim());
      document.getElementById("themeButton").value = rgbToHex(style.getPropertyValue("--button-color").trim());
      document.getElementById("themeButtonText").value = rgbToHex(style.getPropertyValue("--button-text-color").trim());
      document.getElementById("themeBorder").value = rgbToHex(style.getPropertyValue("--border-color").trim());
      document.getElementById("themeEdit").value = rgbToHex(style.getPropertyValue("--edit-color").trim());
      document.getElementById("themeButtonShadow").value = rgbToHex(style.getPropertyValue("--button-shadow-color").trim());
    }

    function getThemeFromInputs(){
      return {
        name: document.getElementById("themeName").value.trim() || "새 테마",
        bgColor: document.getElementById("themeBg").value,
        cardColor: document.getElementById("themeCard").value,
        textColor: document.getElementById("themeText").value,
        buttonColor: document.getElementById("themeButton").value,
        buttonTextColor: document.getElementById("themeButtonText").value,
        borderColor: document.getElementById("themeBorder").value,
        editColor: document.getElementById("themeEdit").value,
        buttonShadowColor: document.getElementById("themeButtonShadow").value
      };
    }

    function hexToRgba(hex, alpha){
      const clean = hex.replace("#", "");
      const bigint = parseInt(clean, 16);
      const r = (bigint >> 16) & 255;
      const g = (bigint >> 8) & 255;
      const b = bigint & 255;
      return `rgba(${r},${g},${b},${alpha})`;
    }

    function applyTheme(theme){
      document.documentElement.style.setProperty("--bg-color", theme.bgColor);
      document.documentElement.style.setProperty("--card-color", theme.cardColor);
      document.documentElement.style.setProperty("--text-color", theme.textColor);
      document.documentElement.style.setProperty("--button-color", theme.buttonColor);
      document.documentElement.style.setProperty("--button-text-color", theme.buttonTextColor);
      document.documentElement.style.setProperty("--border-color", theme.borderColor);
      document.documentElement.style.setProperty("--edit-color", theme.editColor);
      document.documentElement.style.setProperty("--button-shadow-color", theme.buttonShadowColor);
      document.documentElement.style.setProperty("--button-shadow-rgba", hexToRgba(theme.buttonShadowColor, 0.35));

      localStorage.setItem(ACTIVE_THEME_STORAGE_KEY, JSON.stringify(theme));
    }

    function saveTheme(){
      const theme = getThemeFromInputs();

      const existingIndex = savedThemes.findIndex(t => t.name === theme.name);
      if(existingIndex >= 0){
        savedThemes[existingIndex] = theme;
      }else{
        savedThemes.push(theme);
      }

      localStorage.setItem(THEMES_STORAGE_KEY, JSON.stringify(savedThemes));
      applyTheme(theme);
      renderThemeList();
      document.getElementById("themeName").value = "";
    }

    function applySavedThemeByName(name){
      const theme = savedThemes.find(t => t.name === name);
      if(!theme) return;
      applyTheme(theme);
      fillThemeInputsFromCurrent();
    }

    function deleteSavedTheme(name){
      savedThemes = savedThemes.filter(t => t.name !== name);
      localStorage.setItem(THEMES_STORAGE_KEY, JSON.stringify(savedThemes));
      renderThemeList();
    }

    function renderThemeList(){
      const wrap = document.getElementById("themeList");
      wrap.innerHTML = "";

      if(savedThemes.length === 0){
        const empty = document.createElement("div");
        empty.className = "theme-item";
        empty.innerHTML = '<div class="theme-name">저장된 테마가 없습니다.</div>';
        wrap.appendChild(empty);
        return;
      }

      savedThemes.forEach(theme => {
        const item = document.createElement("div");
        item.className = "theme-item";

        const name = document.createElement("div");
        name.className = "theme-name";
        name.textContent = theme.name;

        const applyBtn = document.createElement("button");
        applyBtn.type = "button";
        applyBtn.className = "theme-small-btn";
        applyBtn.textContent = "적용";
        applyBtn.onclick = () => applySavedThemeByName(theme.name);

        const delBtn = document.createElement("button");
        delBtn.type = "button";
        delBtn.className = "theme-small-btn";
        delBtn.textContent = "삭제";
        delBtn.onclick = () => deleteSavedTheme(theme.name);

        item.appendChild(name);
        item.appendChild(applyBtn);
        item.appendChild(delBtn);
        wrap.appendChild(item);
      });
    }

    function resetThemeToDefault(){
      applyTheme(DEFAULT_THEME);
      fillThemeInputsFromCurrent();
    }

    function loadActiveTheme(){
      const saved = localStorage.getItem(ACTIVE_THEME_STORAGE_KEY);
      if(!saved) return;

      try{
        const theme = JSON.parse(saved);
        applyTheme(theme);
      }catch(err){
        console.log(err);
      }
    }

    function rgbToHex(color){
      if(!color) return "#000000";
      if(color.startsWith("#")) return color;

      const result = color.match(/\d+/g);
      if(!result) return "#000000";

      return "#" + result.slice(0,3).map(x => {
        const hex = parseInt(x, 10).toString(16);
        return hex.length === 1 ? "0" + hex : hex;
      }).join("");
    }

    const dropZone = document.getElementById("dropZone");

    dropZone.addEventListener("dragover", (e)=>{
      e.preventDefault();
      dropZone.classList.add("dragover");
    });

    dropZone.addEventListener("dragleave", ()=>{
      dropZone.classList.remove("dragover");
    });

    dropZone.addEventListener("drop", (e)=>{
      e.preventDefault();
      dropZone.classList.remove("dragover");

      const file = e.dataTransfer.files[0];
      if(!file) return;

      handleImageFile(file);
    });

    loadActiveTheme();
    loadGalleryFromDB();
  </script>
