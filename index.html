<!DOCTYPE html>
<html>
<head>

<meta charset="UTF-8">
<title>NAI Metadata Viewer</title>

<script src="https://cdn.jsdelivr.net/npm/exifr/dist/full.umd.js"></script>

<style>

body{
font-family:Arial;
margin:40px;
background:#fafafa;
}

h1{
margin-bottom:20px;
}

.viewer{
display:grid;
grid-template-columns: 1fr 1fr 1fr;
gap:25px;
margin-top:20px;
}

.image-area img{
width:100%;
border-radius:10px;
}

.middle-area{
overflow:auto;
}

.right-area{
overflow:auto;
}

.promptbox{
background:#f3f3f3;
padding:12px;
border-radius:8px;
white-space:pre-wrap;
word-break:break-word;
margin-bottom:20px;
}

</style>

</head>

<body>

<h1>NovelAI Metadata Viewer</h1>

<input type="file" id="imageInput">

<div class="viewer">

<div class="image-area">
<img id="preview">
</div>


<div class="middle-area">

<h3>Image Settings</h3>

<table>
<tr><td>Seed</td><td id="seed"></td></tr>
<tr><td>Steps</td><td id="steps"></td></tr>
<tr><td>Sampler</td><td id="sampler"></td></tr>
<tr><td>CFG</td><td id="cfg"></td></tr>
<tr><td>Size</td><td id="size"></td></tr>
</table>


<h3>Base Prompt</h3>
<button onclick="copyBase()">Copy</button>
<div class="promptbox" id="prompt"></div>


<h3>Negative Prompt</h3>
<button onclick="copyNegative()">Copy</button>
<div class="promptbox" id="negative"></div>

</div>


<div class="right-area">

<h3>Character Prompt</h3>
<div class="promptbox" id="charPrompt"></div>

<h3>Character UC</h3>
<div class="promptbox" id="charUC"></div>

</div>

</div>

<script>

let currentPrompt="";

document.getElementById("imageInput").addEventListener("change", async function(event){

const file = event.target.files[0];
if(!file) return;


// 이미지 미리보기

const reader=new FileReader();

reader.onload=function(e){
document.getElementById("preview").src=e.target.result;
};

reader.readAsDataURL(file);


// 메타데이터 추출

try{

const data=await exifr.parse(file,true);

let jsonText=null;

for(const key in data){

if(typeof data[key]==="string" && data[key].includes('"prompt"')){
jsonText=data[key];
}

}

if(!jsonText) return;

const nai=JSON.parse(jsonText);


// 데이터 표시

currentPrompt=nai.prompt||"";

document.getElementById("prompt").textContent=currentPrompt;
document.getElementById("negative").textContent=nai.uc||"";

document.getElementById("seed").textContent=nai.seed||"-";
document.getElementById("steps").textContent=nai.steps||"-";
document.getElementById("sampler").textContent=nai.sampler||"-";
document.getElementById("cfg").textContent=nai.scale||"-";

document.getElementById("size").textContent=
nai.width+" x "+nai.height;


}catch(err){

console.log(err);

}

});

function copyPrompt(){

navigator.clipboard.writeText(currentPrompt);

alert("Prompt copied");

}

</script>

</body>
</html>
