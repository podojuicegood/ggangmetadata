<!DOCTYPE html>
<html>
<head>

<meta charset="UTF-8">
<title>NAI Metadata Viewer</title>

<script src="https://cdn.jsdelivr.net/npm/exifr/dist/full.umd.js"></script>

<style>

h3{
margin:0 0 8px 0;
font-size:16px;
}
  
body{
font-family:Arial;
background:#F1F0E5;
padding:40px;
}

.container{
display:grid;
grid-template-columns: 420px 1fr;
gap:40px;
align-items:start;
}

.image-panel img{
width:100%;
border-radius:20px;
background:white;
box-shadow:0 6px 15px rgba(183,187,163,0.15);
}

.right-panel{
display:flex;
flex-direction:column;
gap:20px;
}

.top-row{
display:grid;
grid-template-columns:1fr 1fr;
gap:15px;
}

.card{
background:white;
border-radius:16px;
padding:15px;
box-shadow:0 4px 10px rgba(183,187,163,0.1);
}

.prompt-card{
background:white;
border-radius:16px;
padding:15px;
box-shadow:0 4px 10px rgba(183,187,163,0.1);
}

.prompt-header{
display:flex;
align-items:center;
gap:8px;
margin-bottom:6px;
}

.prompt-text{
white-space:pre-wrap;
word-break:break-word;
max-height:160px;
overflow-y:auto;
  padding: 4px;
}

::-webkit-scrollbar{
width:6px;
}

::-webkit-scrollbar-thumb{
background:#BFC4B0;
border-radius:8px;
}

::-webkit-scrollbar-thumb:hover{
background:#BFC4B0;
}
  

  
button{
background:#D3C0C8;
color:white;
border:none;
border-radius:8px;
padding:4px 10px;
font-size:12px;
cursor:pointer;
  margin-top:-8px;
  transition:all 0.2s ease;
}

button:hover{
background:#d9c3c8;
transform:translateY(-2px);
}
  
table{
width:100%;
border-collapse:collapse;
}

td{
padding:4px;
border-bottom:1px solid #ddd;
}

  .image-settings{
margin-top:10px;
font-size:13px;
 background:white;
border-radius:16px;
padding:15px;
box-shadow:0 4px 10px rgba(183,187,163,0.1);
}

.image-settings table{
font-size:12px;
}

#charPrompt,
#charUC{
  display:flex;
width:100%;
display:block;
}
  
.char-grid{
display:grid;
grid-template-columns:1fr 1fr;
gap:15px;
}

.char-grid h4{
margin:0 0 5px 0;
font-size:13px;
}

.char-grid div{
white-space:pre-wrap;
word-break:break-word;
}

  input[type="file"]::file-selector-button {
  background: #D3C0C8;
  color: white;
  border: none;
  border-radius: 8px;
  padding: 4px 10px;
  font-size: 12px;
  cursor: pointer;
    margin-top: -2px;
}

</style>

</head>

<body>

<input type="file" id="imageInput">

<div class="container">

<div class="image-panel">

<img id="preview">

<div class="image-settings">

<h3>Image Settings</h3>

<table>
<tr><td>Seed</td><td id="seed"></td></tr>
<tr><td>Steps</td><td id="steps"></td></tr>
<tr><td>Sampler</td><td id="sampler"></td></tr>
<tr><td>CFG</td><td id="cfg"></td></tr>
<tr><td>Size</td><td id="size"></td></tr>
</table>

</div>

</div>

<div class="right-panel">

<div class="prompt-card">

<div class="prompt-header">
<h3>Prompt</h3>
<button id="copyPromptBtn" onclick="copyBase()">Copy</button>
</div>

<div class="prompt-text" id="prompt"></div>

</div>


<div class="prompt-card">

<div class="prompt-header">
<h3>Negative</h3>
<button id="copyNegativeBtn" onclick="copyNegative()">Copy</button>
</div>

<div class="prompt-text" id="negative"></div>

</div>


<div class="top-row">

<div class="prompt-card">

<h3>Character</h3>

<div class="char-grid">

<div>
<h4>Prompt</h4>
<div id="charPrompt"></div>
</div>

<div>
<h4>UC</h4>
<div id="charUC"></div>
</div>

</div>

</div>

<script>

let basePrompt=""
let negativePrompt=""

document.getElementById("imageInput").addEventListener("change", async function(event){

const file=event.target.files[0]
if(!file) return


const reader=new FileReader()

reader.onload=function(e){
document.getElementById("preview").src=e.target.result
}

reader.readAsDataURL(file)


try{

const data=await exifr.parse(file,true)

let jsonText=null

for(const key in data){

if(typeof data[key]==="string" && data[key].includes('"prompt"')){
jsonText=data[key]
}

}

if(!jsonText) return

const nai=JSON.parse(jsonText)


basePrompt=nai.prompt||""
negativePrompt=nai.uc||""

document.getElementById("prompt").textContent=basePrompt
document.getElementById("negative").textContent=negativePrompt


document.getElementById("seed").textContent=nai.seed||"-"
document.getElementById("steps").textContent=nai.steps||"-"
document.getElementById("sampler").textContent=nai.sampler||"-"
document.getElementById("cfg").textContent=nai.scale||"-"
document.getElementById("size").textContent=nai.width+" x "+nai.height


let charPrompt=""
let charUC=""

try{

charPrompt=nai.v4_prompt.caption.char_captions[0].char_caption||""
charUC=nai.v4_negative_prompt.caption.char_captions[0].char_caption||""

}catch{}

document.getElementById("charPrompt").textContent=charPrompt
document.getElementById("charUC").textContent=charUC


}catch(err){

console.log(err)

}

})


function copyBase(){

navigator.clipboard.writeText(basePrompt)

const btn=document.getElementById("copyPromptBtn")

btn.textContent="✓"

setTimeout(()=>{
btn.textContent="Copy"
},1500)

}

function copyNegative(){

navigator.clipboard.writeText(negativePrompt)

const btn=document.getElementById("copyNegativeBtn")

btn.textContent="✓"

setTimeout(()=>{
btn.textContent="Copy"
},1500)

}

</script>

</body>
</html>
